name: Build OpenWrt for MT7986A

on:
  repository_dispatch:
  workflow_dispatch:

# 全局环境变量：强制 Node.js 24 + 网络优化
env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config/.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制 Node.js 24
  # 网络优化：超时时间延长
  GIT_SSH_COMMAND: "ssh -o ConnectTimeout=300"

jobs:
  build:
    runs-on: ubuntu-22.04
    # 增加虚拟机资源（可选，提升稳定性）
    timeout-minutes: 480
    steps:
    - name: Checkout
      uses: actions/checkout@v4.2.2  # 最新稳定版，完全支持 Node.js 24

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 1. 替换 Ubuntu 源为阿里云（最快）
        sudo cp /etc/apt/sources.list /etc/apt/sources.list.bak
        sudo echo "deb http://mirrors.aliyun.com/ubuntu/ jammy main restricted universe multiverse
        deb http://mirrors.aliyun.com/ubuntu/ jammy-updates main restricted universe multiverse
        deb http://mirrors.aliyun.com/ubuntu/ jammy-backports main restricted universe multiverse
        deb http://mirrors.aliyun.com/ubuntu/ jammy-security main restricted universe multiverse" > /etc/apt/sources.list
        # 2. 安装依赖（精简，只装必需项）
        sudo apt update -y
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget libelf-dev libtool-bin
        sudo apt autoremove -y && sudo apt clean -y
        # 3. 10G 交换分区（必须）
        sudo fallocate -l 10G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        # 4. 安装加速工具（解决 DNS 解析慢）
        sudo apt install -y dnsutils
        echo "nameserver 223.5.5.5" | sudo tee /etc/resolv.conf > /dev/null  # 阿里云 DNS

    - name: Clone source code (with mirror)
      run: |
        # 方案1：优先用国内镜像克隆源码（避免直接访问 GitHub）
        if ! git clone --depth=1 --single-branch --branch $REPO_BRANCH https://mirror.ghproxy.com/$REPO_URL openwrt; then
            # 方案2：备用源（清华镜像）
            git clone --depth=1 --single-branch --branch $REPO_BRANCH https://mirrors.tuna.tsinghua.edu.cn/git/lede/openwrt.git openwrt
        fi
        cd openwrt
        # 替换所有 feeds 为国内镜像（彻底解决下载失败）
        rm -f feeds.conf.default
        cat > feeds.conf.default << EOF
        src-git packages https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/packages.git
        src-git luci https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/luci.git
        src-git routing https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/routing.git
        src-git telephony https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/telephony.git
        src-git kenzo https://mirror.ghproxy.com/https://github.com/kenzok8/openwrt-packages
        src-git small https://mirror.ghproxy.com/https://github.com/kenzok8/small
        EOF
        # 更新 feeds（单线程，最高重试）
        ./scripts/feeds update -a -f || ./scripts/feeds update -a -f || ./scripts/feeds update -a -f
        ./scripts/feeds install -a

    - name: Load custom config (2G/128G/USB3.0/MT7986A)
      run: |
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config || echo "No custom config, use default"
        cd openwrt
        # 硬件适配 + 关闭默认 WiFi
        cat >> .config << EOF
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_filogic=y
        CONFIG_TARGET_mediatek_filogic_DEVICE_generic=y
        CONFIG_KERNEL_HUGETLB_PAGE=y
        CONFIG_KERNEL_SWAP=y
        CONFIG_KERNEL_ZSWAP=y
        CONFIG_PACKAGE_kmod-mmc=y
        CONFIG_PACKAGE_kmod-block2mtd=y
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_kmod-fs-ntfs3=y
        CONFIG_PACKAGE_kmod-usb3=y
        CONFIG_PACKAGE_kmod-usb-storage=y
        CONFIG_PACKAGE_kmod-mt7530=y
        CONFIG_PACKAGE_kmod-phy-realtek=y
        CONFIG_PACKAGE_swconfig=y
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        # 精简编译：关闭调试、减少日志
        CONFIG_DEBUG_KERNEL=n
        CONFIG_KERNEL_DEBUG=n
        CONFIG_KERNEL_LOG_BUF_SHIFT=16
        EOF
        make defconfig

    - name: Download packages (single thread)
      run: |
        cd openwrt
        # 单线程下载（最慢但最稳定，彻底解决 Too many retries）
        make download -j1 V=s
        # 清理无效文件
        find dl -type f -size 0 -delete
        find dl -name "*.tmp" -delete

    - name: Build firmware (low concurrency)
      run: |
        cd openwrt
        # 极低并发编译（2 线程，适配网络/内存）
        make -j2 V=s || make -j1 V=s
        echo "Build success! Firmware path: openwrt/bin/targets/"

    - name: Upload firmware (Node.js 24 compatible)
      if: env.UPLOAD_FIRMWARE == 'true' && success()
      uses: softprops/action-gh-release@v2.0.8  # 最新版，支持 Node.js 24
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: openwrt/bin/targets/**/*.bin
        tag_name: MT7986A-LEDE-Stable-$(date +%Y%m%d)
        generate_release_notes: true
