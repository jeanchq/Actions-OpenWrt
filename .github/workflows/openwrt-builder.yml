name: Build LEDE-MT7986A-2G-128G-EMMC-MT7531-RTL8221B

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    # ========== 第一步：紧急清理磁盘空间（核心修复） ==========
    - name: Clean Disk Space (Critical!)
      run: |
        echo "==== 清理前磁盘使用情况 ===="
        df -h
        
        # 1. 删除超大无用包（GitHub 预装的安卓/微软SDK、docker镜像等）
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker system prune -a -f || true
        sudo rm -rf /var/lib/docker
        
        # 2. 删除无用系统包
        sudo apt remove -y libreoffice* firefox google-chrome* azure-cli ghc* llvm*
        sudo apt autoremove -y && sudo apt clean -y
        
        # 3. 清空临时目录
        sudo rm -rf /tmp/* /var/tmp/*
        sudo rm -rf ${{ github.workspace }}/* || true
        
        echo "==== 清理后磁盘使用情况 ===="
        df -h

    - name: Checkout LEDE Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        repository: coolsnowwolf/lede
        ref: master

    # ========== 第二步：优化 SWAP（减小尺寸，避免占满磁盘） ==========
    - name: Create Smaller SWAP (Disk Friendly)
      run: |
        # 减小 SWAP 到 4G（2G内存足够用，节省磁盘）
        sudo fallocate -l 4G /mnt/swapfile
        sudo chmod 600 /mnt/swapfile
        sudo mkswap /mnt/swapfile
        sudo swapon /mnt/swapfile
        sudo sysctl vm.swappiness=10
        swapon --show
        free -h

    - name: Install Dependencies
      run: |
        sudo apt update -y && sudo apt full-upgrade -y
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget \
        libelf-dev libtool-bin automake autoconf texinfo patch libglib2.0-dev pkg-config \
        python3 python3-pip qemu-utils upx-ucl liblzma-dev liblz4-dev
        sudo apt autoremove -y && sudo apt clean -y

    - name: Update Feeds
      run: |
        sed -i 's#mirrors.tuna.tsinghua.edu.cn/git/openwrt#git.openwrt.org#g' feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # ========== 第三步：MT7986A 配置（适配硬件+减小编译体积） ==========
    - name: Generate MT7986A Defconfig
      run: |
        # 选择 MT7986A 通用配置（替换成你的设备名！）
        cat > .config << EOF
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_filogic=y
        # 替换成你的设备名，比如 CONFIG_TARGET_mediatek_filogic_DEVICE_xiaomi_mi-router-ax3000t=y
        CONFIG_TARGET_mediatek_filogic_DEVICE_generic=y
        CONFIG_TARGET_BOARD="filogic"
        CONFIG_TARGET_SUBTARGET="filogic"
        CONFIG_TARGET_PROFILE="DEFAULT"
        EOF

        make defconfig

        # 硬件适配 + 减小编译体积（关闭无用功能）
        cat >> .config << EOF
        # MT7986A 核心
        CONFIG_TARGET_MEDIATEK_FILOGIC_MT7986A=y
        CONFIG_TARGET_BOARDNAME="mt7986a"

        # 内存/存储（128G EMMC）
        CONFIG_TARGET_KERNEL_PARTSIZE=512
        CONFIG_TARGET_ROOTFS_PARTSIZE=102400
        CONFIG_PACKAGE_kmod-mmc=y
        CONFIG_PACKAGE_kmod-sdhci=y
        CONFIG_PACKAGE_e2fsprogs=y
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_kmod-fs-ntfs3=y

        # USB3.0
        CONFIG_PACKAGE_kmod-usb3=y
        CONFIG_PACKAGE_kmod-usb-dwc3=y
        CONFIG_PACKAGE_kmod-usb-xhci=y

        # MT7531AE 交换机
        CONFIG_PACKAGE_kmod-mt7530=y
        CONFIG_PACKAGE_kmod-mt7531=y
        CONFIG_PACKAGE_kmod-switch-mt7530=y

        # RTL8221B 2.5G
        CONFIG_PACKAGE_kmod-libphy=y
        CONFIG_PACKAGE_kmod-rtl8221=y
        CONFIG_PACKAGE_kmod-r8169=y

        # 关闭无用功能（减小编译体积）
        CONFIG_PACKAGE_luci-app-vlmcsd=n
        CONFIG_PACKAGE_luci-app-ddns=n
        CONFIG_PACKAGE_luci-app-v2raya=n
        CONFIG_PACKAGE_luci-app-openclash=n
        CONFIG_PACKAGE_luci-app-passwall=n
        CONFIG_PACKAGE_luci-app-ssr-plus=n
        CONFIG_PACKAGE_luci-app-wrtbwmon=n
        EOF

        make defconfig

        # 验证配置
        echo "==== 关键配置校验 ===="
        grep -E "mt7986|mt7531|rtl8221|emmc|usb3|ext4" .config
        ls -la .config

    # ========== 第四步：编译优化（清理临时文件） ==========
    - name: Pre-download Dependencies
      run: |
        make download -j$(nproc) V=s
        # 下载完成后清理临时缓存
        rm -rf ./tmp/* || true

    - name: Build Firmware (Disk Optimized)
      run: |
        # 单线程编译（虽然慢，但最省磁盘/内存，避免崩溃）
        make -j1 V=s
        # 编译完成后立即清理临时文件
        rm -rf ./tmp/* || true

    - name: Package Artifacts
      run: |
        mkdir -p artifact
        # 只复制最终固件（不复制中间文件，节省空间）
        cp -rf bin/targets/mediatek/filogic/*.bin artifact/ || true
        cp -rf bin/targets/mediatek/filogic/*.img.gz artifact/ || true
        cp .config artifact/used-config.txt
        # 显示产物
        ls -lh artifact/

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: LEDE-MT7986A-${{ github.run_id }}
        name: LEDE MT7986A 2G+128G EMMC MT7531AE RTL8221B
        files: ./artifact/*
        body: |
          MT7986A (Filogic 830)
          2G RAM / 128G EMMC
          MT7531AE Switch / RTL8221B 2.5G / USB3.0
          编译优化：单线程 + 磁盘清理
