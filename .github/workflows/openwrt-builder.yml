name: Build-LEDE-S20PLUS-MT7986A-2x2.5G-5x1G

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    # ========== 1. 磁盘清理（核心解决空间不足） ==========
    - name: Clean Disk Space (Critical)
      run: |
        echo "==== 清理前磁盘占用 ===="
        df -h
        
        # 释放 5-8GB 空间
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker system prune -a -f || true
        sudo rm -rf /var/lib/docker
        sudo apt remove -y libreoffice* firefox google-chrome* azure-cli || true
        sudo apt autoremove -y --purge || true
        sudo apt clean -y
        sudo rm -rf /tmp/* /var/tmp/*
        
        echo "==== 清理后磁盘占用 ===="
        df -h

    # ========== 2. 拉取 LEDE 源码 ==========
    - name: Checkout LEDE Source (S20PLUS)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        repository: coolsnowwolf/lede
        ref: master

    # ========== 3. 创建 4G SWAP（适配 2G 内存） ==========
    - name: Create 4G SWAP
      run: |
        sudo fallocate -l 4G /mnt/swapfile
        sudo chmod 600 /mnt/swapfile
        sudo mkswap /mnt/swapfile
        sudo swapon /mnt/swapfile
        sudo sysctl vm.swappiness=10
        swapon --show
        free -h

    # ========== 4. 安装编译依赖 ==========
    - name: Install Dependencies
      run: |
        sudo apt update -y && sudo apt full-upgrade -y
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget \
        libelf-dev libtool-bin automake autoconf texinfo patch libglib2.0-dev pkg-config \
        python3 python3-pip qemu-utils upx-ucl liblzma-dev liblz4-dev
        sudo apt autoremove -y && sudo apt clean -y

    # ========== 5. 更新 Feeds 并适配 S20PLUS ==========
    - name: Update Feeds & Patch S20PLUS
      run: |
        # 替换国际源，适配 GitHub 网络
        sed -i 's#mirrors.tuna.tsinghua.edu.cn/git/openwrt#git.openwrt.org#g' feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        # 确保 S20PLUS 设备树被识别（关键）
        if [ ! -f "target/linux/mediatek/files/arch/arm64/boot/dts/mediatek/mt7986a-s20plus.dts" ]; then
          echo "==== 适配 S20PLUS 设备树 ===="
          # 复制通用 MT7986A 设备树并适配 S20PLUS 拓扑
          cp target/linux/mediatek/files/arch/arm64/boot/dts/mediatek/mt7986a-generic.dts target/linux/mediatek/files/arch/arm64/boot/dts/mediatek/mt7986a-s20plus.dts
          # 追加 S20PLUS 网口拓扑配置（WAN直连/ LAN2.5G走交换机）
          echo -e "\n/* S20PLUS 网口拓扑：WAN2.5G直连CPU，LAN2.5G走MT7531AE */" >> target/linux/mediatek/files/arch/arm64/boot/dts/mediatek/mt7986a-s20plus.dts
          echo "&gmac0 { status = \"okay\"; phy-mode = \"sgmii\"; phy-handle = <&rtl8221b_wan>; };" >> target/linux/mediatek/files/arch/arm64/boot/dts/mediatek/mt7986a-s20plus.dts
          echo "&switch0 { status = \"okay\"; phy-mode = \"hsgmii\"; phy-handle = <&rtl8221b_lan>; };" >> target/linux/mediatek/files/arch/arm64/boot/dts/mediatek/mt7986a-s20plus.dts
        fi

    # ========== 6. S20PLUS 专属 .config（核心） ==========
    - name: Write S20PLUS .config
      run: |
        cat > .config << 'EOF'
        # ===================== S20PLUS 基础配置 =====================
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_filogic=y
        CONFIG_TARGET_MEDIATEK_FILOGIC_MT7986A=y
        # 绑定 S20PLUS 设备树（关键，确保固件适配机型）
        CONFIG_TARGET_mediatek_filogic_DEVICE_mediatek_mt7986a-s20plus=y
        CONFIG_TARGET_BOARD="filogic"
        CONFIG_TARGET_SUBTARGET="filogic"
        CONFIG_TARGET_PROFILE="DEFAULT"
        CONFIG_TARGET_ARCH_PACKAGES="aarch64_cortex-a53"

        # ===================== 存储配置（128G EMMC） =====================
        CONFIG_TARGET_KERNEL_PARTSIZE=512  # 内核分区 512M
        CONFIG_TARGET_ROOTFS_PARTSIZE=102400  # 根分区 100G（适配128G EMMC）
        CONFIG_PACKAGE_kmod-mmc=y  # EMMC 驱动
        CONFIG_PACKAGE_kmod-sdhci=y
        CONFIG_PACKAGE_e2fsprogs=y  # EXT4 工具
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_kmod-fs-ntfs3=y  # NTFS 支持

        # ===================== USB3.0 配置 =====================
        CONFIG_PACKAGE_kmod-usb3=y
        CONFIG_PACKAGE_kmod-usb-dwc3=y
        CONFIG_PACKAGE_kmod-usb-xhci=y
        CONFIG_PACKAGE_kmod-usb-storage=y

        # ===================== S20PLUS 网口拓扑（核心适配） =====================
        # MT7531AE 交换机（5×1G + LAN2.5G）
        CONFIG_PACKAGE_kmod-mt7530=y
        CONFIG_PACKAGE_kmod-mt7531=y
        CONFIG_PACKAGE_kmod-switch-mt7530=y
        CONFIG_PACKAGE_swconfig=y  # 交换机配置工具
        # 双 RTL8221B 2.5G PHY（WAN直连/ LAN2.5G走交换机）
        CONFIG_PACKAGE_kmod-libphy=y
        CONFIG_PACKAGE_kmod-rtl8221=y
        CONFIG_PACKAGE_kmod-mdio-gpio=y  # HSGMII 必需
        CONFIG_PACKAGE_kmod-of-mdio=y
        CONFIG_PACKAGE_kmod-r8169=y
        CONFIG_PACKAGE_ethtool=y  # 网口调试工具

        # ===================== 网络基础配置 =====================
        CONFIG_PACKAGE_ip-full=y
        CONFIG_PACKAGE_iproute2=y
        CONFIG_PACKAGE_dnsmasq-full=y
        CONFIG_PACKAGE_firewall=y
        CONFIG_PACKAGE_bridge=y
        CONFIG_PACKAGE_luci=y  # LuCI 网页管理
        CONFIG_PACKAGE_luci-theme-argon=y  # S20PLUS 常用主题
        CONFIG_PACKAGE_luci-app-firewall=y
        CONFIG_PACKAGE_luci-proto-pppoe=y  # PPPoE 拨号（宽带必备）

        # ===================== 关闭无用功能（减小编译体积） =====================
        CONFIG_PACKAGE_luci-app-vlmcsd=n
        CONFIG_PACKAGE_luci-app-ddns=n
        CONFIG_PACKAGE_luci-app-openclash=y
        CONFIG_PACKAGE_luci-app-passwall=y
        EOF

        # 自动修复配置依赖
        make defconfig

        # 验证 S20PLUS 关键配置
        echo "==== S20PLUS 配置校验 ===="
        grep -E "s20plus|mt7986|mt7531|rtl8221|emmc|usb3" .config

    # ========== 7. 预下载依赖包 ==========
    - name: Pre-download Dependencies
      run: |
        make download -j$(nproc) V=s
        # 清理临时文件，释放空间
        rm -rf ./tmp/* || true

    # ========== 8. 编译固件（单线程适配 2G 内存） ==========
    - name: Build S20PLUS Firmware
      run: |
        make -j1 V=s  # 单线程最稳定，避免 OOM/磁盘满

    # ========== 9. 打包产物 ==========
    - name: Package Artifacts
      run: |
        mkdir -p artifact
        # 复制 S20PLUS 固件（优先 bin/img.gz 格式）
        cp -rf bin/targets/mediatek/filogic/*s20plus*.bin artifact/ || true
        cp -rf bin/targets/mediatek/filogic/*s20plus*.img.gz artifact/ || true
        # 备份编译配置（便于后续修改）
        cp .config artifact/S20PLUS-LEDE-config.txt
        # 显示产物列表
        ls -lh artifact/

    # ========== 10. 上传到 GitHub Releases ==========
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: LEDE-S20PLUS-${{ github.run_id }}
        name: LEDE S20PLUS MT7986A 2×2.5G+5×1G 128G EMMC
        files: ./artifact/*
        body: |
          LEDE 固件（S20PLUS 专属）
          硬件适配：
          - CPU: MT7986A (Filogic 830)
          - 内存: 2G RAM
          - 存储: 128G EMMC
          - 网口: WAN2.5G（RTL8221B 直连CPU） + LAN2.5G（RTL8221B → MT7531AE） + 5×1G（MT7531AE）
          - 扩展: USB3.0
          编译特性：单线程编译，适配 2G 内存，无磁盘溢出风险
