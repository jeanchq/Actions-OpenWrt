name: Build OpenWrt for MT7986A

on:
  repository_dispatch:
  workflow_dispatch:  # 手动触发编译

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config/.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget libelf-dev libtool-bin autoconf automake texinfo patch pkg-config libglib2.0-dev libfuse-dev python3-pip python3-setuptools swig
        sudo apt autoremove -y && sudo apt clean -y
        # 针对2G内存优化：增加10G交换分区（云端编译更稳定）
        sudo fallocate -l 10G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        sed -i 's#https://github.com#https://mirror.ghproxy.com/https://github.com#g' ./feeds.conf.default
        ./scripts/feeds update -a && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P1_SH $DIY_P2_SH
        cd openwrt
        ../$DIY_P1_SH
        # 追加硬件适配配置（覆盖.config，确保开启2G内存/EMMC/USB3.0支持）
        cat >> .config << EOF
        # 内存优化
        CONFIG_KERNEL_HUGETLB_PAGE=y
        CONFIG_KERNEL_SWAP=y
        CONFIG_KERNEL_ZSWAP=y
        # EMMC存储优化
        CONFIG_PACKAGE_kmod-mmc=y
        CONFIG_PACKAGE_kmod-block2mtd=y
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_kmod-fs-ntfs3=y
        CONFIG_PACKAGE_kmod-fs-exfat=y
        # USB3.0完整支持
        CONFIG_PACKAGE_kmod-usb3=y
        CONFIG_PACKAGE_kmod-usb-storage=y
        CONFIG_PACKAGE_kmod-usb-storage-uas=y
        CONFIG_PACKAGE_usbmount=y
        CONFIG_PACKAGE_ntfs-3g=y
        CONFIG_PACKAGE_exfatprogs=y
        # 性能调优
        CONFIG_KERNEL_NO_HZ_FULL=y
        CONFIG_KERNEL_PREEMPT_NONE=y
        EOF
        make defconfig

    - name: Download packages
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build firmware
      run: |
        cd openwrt
        # 2G内存设备编译时，云端并发数设为4（避免内存溢出）
        make -j4 V=s || make -j1 V=s
        echo "======================="
        echo "Build firmware finished!"
        echo "======================="

    - name: Upload firmware to release
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      uses: softprops/action-gh-release@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: openwrt/bin/targets/**/*.bin
        tag_name: MT7986A-LEDE-2G-128G-$(date +%Y%m%d)
