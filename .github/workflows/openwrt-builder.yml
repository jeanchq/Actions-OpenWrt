name: Build-ImmortalWrt-S20PLUS-MT7986A-WIRED

on:
  workflow_dispatch:
    inputs:
      ssh_debug:
        description: 'Enable SSH Debug Session'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-24.10.5
  CONFIG_FILE: .config
  DIY_SCRIPT: diy-script.sh
  CACHE_DIR: ~/cache

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/*
          sudo docker system prune -a -f --volumes || true
          sudo apt remove -y --purge azure-cli google-chrome-stable firefox mono-devel libgl1-mesa-dri || true
          sudo apt autoremove -y --purge
          sudo apt clean
          df -h

      - name: Create 8G SWAP (For 2G RAM Safety)
        run: |
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          echo "vm.swappiness=10" | sudo tee -a /etc/sysctl.conf
          free -h

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_URL }}
          ref: ${{ env.REPO_BRANCH }}
          fetch-depth: 0

      - name: Cache Feeds & DL
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            dl
            feeds
            ~/.ccache
          key: immortalwrt-mt7986-${{ runner.os }}-${{ hashFiles('scripts/feeds') }}
          restore-keys: |
            immortalwrt-mt7986-${{ runner.os }}-

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libssl-dev python3 python3-distutils python3-setuptools \
          python3-dev rsync subversion swig time xsltproc zlib1g-dev wget \
          unzip zip libfuse-dev meson ninja-build qemu-utils kmod-sh \
          libgmp3-dev libmpc-dev libmpfr-dev libzstd-dev device-tree-compiler

      - name: Apply Customizations (DIY Script)
        run: |
          # 1. Update Feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 2. Custom DTS for S20PLUS (Based on Generic Filogic)
          # 注意：ImmortalWrt 已经有完善的 mt7986 支持，我们只需确保 DTS 包含 RTL8221B 的正确定义
          # 这里我们直接使用 generic 配置，因为 generic 通常已包含对 MT7531+RTL8221 的基本支持
          # 如果需要强制指定端口标签，可以修改 target/linux/mediatek/dts/mt7986a-xiaomi-redmi-router-ax6000.dts 作为参考
          
          # 3. Generate .config for Wired Only + 128G EMMC + Swap
          cat > .config << EOF
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_generic=y
          CONFIG_TARGET_BOARD="filogic"
          CONFIG_TARGET_SUBTARGET="filogic"
          
          # Kernel Features
          CONFIG_KERNEL_SWAP=y
          CONFIG_KERNEL_HUGETLBFS=y
          CONFIG_KERNEL_TRANSPARENT_HUGEPAGE=y
          CONFIG_KERNEL_CGROUP_FREEZER=y
          CONFIG_KERNEL_TCP_CONG_BBR=y
          CONFIG_DEFAULT_tcp_bbr=y
          
          # Filesystem for 128G EMMC
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=n
          CONFIG_TARGET_IMAGES_GZIP=n
          CONFIG_TARGET_ROOTFS_PARTSIZE=10240
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-ntfs=y
          CONFIG_PACKAGE_ntfs-3g=y
          CONFIG_PACKAGE_kmod-fs-f2fs=y
          CONFIG_PACKAGE_mkf2fs=y
          
          # USB 3.0 Full Stack
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb-xhci-hcd=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-uas=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-net-rtl8152=y
          CONFIG_PACKAGE_kmod-usb-ledtrig-usbport=y
          
          # Network Drivers (MT7531AE + RTL8221B)
          CONFIG_PACKAGE_kmod-mt7530=y
          CONFIG_PACKAGE_kmod-dsa=y
          CONFIG_PACKAGE_kmod-phy-realtek=y
          CONFIG_PACKAGE_ethtool=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_iwinfo=y
          
          # LuCI Base
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-diskman=y
          CONFIG_PACKAGE_luci-app-samba4=y
          CONFIG_PACKAGE_luci-app-wol=y
          
          # DISABLE WIRELESS (Strictly Wired)
          #CONFIG_PACKAGE_mac80211=n
          #CONFIG_PACKAGE_wpad=n
          #CONFIG_PACKAGE_hostapd=n
          #CONFIG_PACKAGE_iw=n
          #CONFIG_PACKAGE_cfg80211=n
          #CONFIG_TARGET_DEVICES_IGNORE_wifi=y
          #CONFIG_KMOD_MT7915E=n
          #CONFIG_KMOD_MT7986_FIRMWARE=n
          
          # Optimization
          CONFIG_DEVEL=y
          CONFIG_CCACHE=y
          CONFIG_AUTOREMOVE=n
          EOF

          # 4. Apply Config
          make defconfig

      - name: Pre-download Sources
        run: |
          make download -j$(nproc) V=s || make download -j1 V=s
          find dl -size -1024c -exec ls -l {} \;

      - name: Compile Firmware
        timeout-minutes: 300
        run: |
          # 使用单线程或低并行度防止 2G 内存 OOM，依赖 CCACHE 加速
          export MAKEFLAGS="-j2" 
          make V=s 2>&1 | tee build.log
      
      - name: Check Build Status
        run: |
          if [ $? -ne 0 ]; then
            echo "Build Failed! Checking logs..."
            tail -n 50 build.log
            exit 1
          fi
          ls -lh bin/targets/mediatek/filogic/

      - name: Prepare Artifacts
        run: |
          mkdir -p release_files
          cp bin/targets/mediatek/filogic/*.img.gz release_files/ 2>/dev/null || true
          cp bin/targets/mediatek/filogic/*.ext4 release_files/ 2>/dev/null || true
          # 重命名文件以便识别
          cd release_files
          for f in *; do mv "$f" "S20PLUS_MT7986A_WIRED_${f}"; done
          cd ..
          cp .config release_files/
          cp build.log release_files/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          tag_name: S20PLUS-WIRED-${{ github.run_id }}
          name: "S20PLUS MT7986A 纯有线优化版 (ImmortalWrt)"
          files: ./release_files/*
          body: |
            ### 🚀 S20PLUS MT7986A 定制固件
            - **核心**: ImmortalWrt 23.05 (Kernel 5.15+)
            - **硬件**: MT7986A + MT7531AE + RTL8221B (2.5G)
            - **存储**: 128G EMMC (EXT4 + NTFS 支持)
            - **内存**: 开启 Swap + 大页支持，禁用 WiFi 释放资源
            - **网络**: BBR 拥塞控制，全 USB3.0 驱动 (UAS)
            - **注意**: 首次启动需通过串口或 DHCP 获取 IP，登录后可用 `resize2fs` 扩容全盘。

      - name: Cleanup
        if: always()
        run: |
          sudo swapoff /mnt/swapfile || true
          rm -rf ./release_files
