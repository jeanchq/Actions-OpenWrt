name: Build LEDE (2G+128G+MT7531AE+RTL8221B)

on:
  workflow_dispatch:  # 仅手动触发，避免误编译

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout LEDE Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        repository: coolsnowwolf/lede
        ref: master

    # 1. GitHub 专用：创建 SWAP（解决 2G 内存编译 OOM，适配 GitHub 权限）
    - name: Create SWAP (GitHub Optimized)
      run: |
        # GitHub 允许创建 SWAP 但路径需调整，避免权限问题
        sudo fallocate -l 8G /mnt/swapfile
        sudo chmod 600 /mnt/swapfile
        sudo mkswap /mnt/swapfile
        sudo swapon /mnt/swapfile
        sudo sysctl vm.swappiness=10
        # 验证 SWAP
        swapon --show
        free -h

    # 2. 安装依赖（GitHub 用官方源，避免国内源访问慢）
    - name: Install Dependencies
      run: |
        sudo apt update -y && sudo apt full-upgrade -y
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget \
        libelf-dev libtool-bin automake autoconf texinfo patch libglib2.0-dev pkg-config
        sudo apt autoremove -y && sudo apt clean -y

    # 3. 替换 LEDE 国际源（GitHub 访问国外源更快）
    - name: Replace Global Mirrors (GitHub Optimized)
      run: |
        # 替换为 OpenWrt 官方国际源，避免国内源超时
        sed -i 's#mirrors.tuna.tsinghua.edu.cn/git/openwrt#git.openwrt.org#g' feeds.conf.default
        ./scripts/feeds update -a && ./scripts/feeds install -a

    # 4. 加载你的硬件定制配置（2G/128G/网卡/USB3.0）
    - name: Load Custom Hardware Config
      run: |
        # 第一步：打印工作目录和所有文件（帮你定位）
        echo "=== 当前工作目录：${{ github.workspace }}"
        echo "=== 工作目录下所有文件/文件夹 ==="
        ls -la "${{ github.workspace }}"
        echo "=== 递归查找所有 .config 文件 ==="
        find "${{ github.workspace }}" -name ".config" -print

        # 第二步：按优先级查找 .config 文件（覆盖所有可能路径）
        CONFIG_FILE=""
        # 优先级1：仓库根目录
        if [ -f "${{ github.workspace }}/.config" ]; then
          CONFIG_FILE="${{ github.workspace }}/.config"
        # 优先级2：openwrt 子目录（常见错误位置）
        elif [ -f "${{ github.workspace }}/openwrt/.config" ]; then
          CONFIG_FILE="${{ github.workspace }}/openwrt/.config"
        # 优先级3：.github 子目录
        elif [ -f "${{ github.workspace }}/.github/.config" ]; then
          CONFIG_FILE="${{ github.workspace }}/.github/.config"
        fi

        # 第三步：检查是否找到文件
        if [ -n "$CONFIG_FILE" ]; then
          echo "✅ 找到 .config 文件：$CONFIG_FILE"
          cp "$CONFIG_FILE" ./.config
          make defconfig
          # 验证关键驱动配置
          grep -E "mt7531|rtl8221|usb3|ext4|ntfs" .config
        else
          echo "❌ 未找到任何 .config 文件！"
          exit 1
        fi

    # 5. 编译固件（GitHub 用 -j4 更高效，配合 8G SWAP 避免 OOM）
    - name: Build Firmware (GitHub Optimized)
      run: |
        make -j4 V=s  # GitHub 服务器CPU核心多，-j4 比 -j2 更快且稳定

    # 6. 打包产物（兼容 GitHub Releases）
    - name: Package Artifacts
      run: |
        mkdir -p ./artifact/firmware
        cp -rf ./bin/targets/*/*/*.bin ./artifact/firmware/
        cp -rf ./bin/targets/*/*/*.img.gz ./artifact/firmware/
        cp .config ./artifact/used-config-${{ github.run_id }}.txt
        echo "Hardware: 2G RAM + 128G EMMC + MT7531AE + RTL8221B + USB3.0" > ./artifact/hardware-info.txt

    # 7. 上传到 GitHub Releases
    - name: Upload to GitHub Releases
      uses: softprops/action-gh-release@v1
      with:
        tag_name: LEDE-HW-${{ github.run_id }}
        name: LEDE 2G+128G+MT7531AE+RTL8221B
        files: |
          ./artifact/*
        body: |
          GitHub Actions 编译产物
          硬件适配：2G内存(SWAP/大页) + 128G EMMC(EXT4/NTFS) + USB3.0 + MT7531AE/RTL8221B
          编译时间：${{ github.run_started_at }}
