name: Build-LEDE-S20PLUS-MT7986A-2x2.5G-5x1G

on:
  workflow_dispatch:  # 手动触发编译

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # 允许上传 Release 产物

    steps:
      - name: Clean Disk Space (Critical)
        run: |
          echo "==== 清理前磁盘占用 ===="
          df -h
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/*
          sudo docker system prune -a -f --volumes || true
          sudo rm -rf /var/lib/docker /var/lib/containers
          sudo apt remove -y --purge libreoffice* firefox* chrome* azure-cli ghc* zulu* mongodb* mysql* postgresql* || true
          sudo apt autoremove -y --purge || true
          sudo apt clean -y && sudo apt autoclean -y
          sudo rm -rf /tmp/* /var/tmp/* /var/cache/apt/*
          sudo truncate -s 0 /var/log/*log
          echo "==== 清理后磁盘占用 ===="
          df -h

      - name: Checkout LEDE Source
        uses: actions/checkout@v4.2.1
        with:
          fetch-depth: 0
          repository: coolsnowwolf/lede
          ref: master

      - name: Create 8G SWAP
        run: |
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          sudo sysctl vm.swappiness=10 vm.vfs_cache_pressure=50
          swapon --show
          free -h

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt full-upgrade -y -o Dpkg::Options::="--force-confdef"
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget libelf-dev libtool-bin automake autoconf texinfo patch libglib2.0-dev \
            pkg-config python3 python3-pip qemu-utils upx-ucl liblzma-dev liblz4-dev \
            device-tree-compiler kmod ethtool
          sudo apt autoremove -y && sudo apt clean -y
          sudo pip3 install --upgrade pip setuptools

      - name: Update Feeds & Patch S20PLUS
        run: |
          sed -i 's#mirrors.tuna.tsinghua.edu.cn/git/openwrt#git.openwrt.org#g' feeds.conf.default
          ./scripts/feeds update -a || true
          ./scripts/feeds install -a || true

          # 定义设备树路径
          DTS_DIR="target/linux/mediatek/files/arch/arm64/boot/dts/mediatek"
          GENERIC_DTS="${DTS_DIR}/mt7986a-generic.dts"
          S20PLUS_DTS="${DTS_DIR}/mt7986a-s20plus.dts"
          
          mkdir -p $(dirname ${S20PLUS_DTS})
          
          # 复制并修改设备树
          if [ -f "${GENERIC_DTS}" ] && [ ! -f "${S20PLUS_DTS}" ]; then
            echo "==== 适配 S20PLUS 设备树 ===="
            cp "${GENERIC_DTS}" "${S20PLUS_DTS}"
            
            cat >> "${S20PLUS_DTS}" << 'EOF'
            /* S20PLUS 网口拓扑 */
            &gmac0 {
              status = "okay";
               phy-mode = "hsgmii";
               phy-handle = <&rtl8221b_wan>;
             };

            &gmac1 {
             status = "okay";
             phy-mode = "2500base-x";
             fixed-link {
             speed = <2500>;
             full-duplex;
             pause;
               };
            };

           &mdio {
            status = "okay";
            rtl8221b_wan: phy@0 {
              reg = <0>;
              compatible = "ethernet-phy-ieee802.3-c45";
              reset-gpios = <&pio 10 GPIO_ACTIVE_LOW>;
              reset-assert-us = <10000>;
              reset-deassert-us = <50000>;
              };
            rtl8221b_lan: phy@1 {
              reg = <1>;
              compatible = "ethernet-phy-ieee802.3-c45";
              reset-gpios = <&pio 11 GPIO_ACTIVE_LOW>;
              reset-assert-us = <10000>;
              reset-deassert-us = <50000>;
             };
          };

          &switch0 {
            status = "okay";
              ports {
             #address-cells = <1>;
             #size-cells = <0>;
             port@0 {
             reg = <0>;
             label = "lan1";
             phy-handle = <&rtl8221b_lan>;
             phy-mode = "hsgmii";
             status = "okay";
              };
            port@6 {
              reg = <6>;
              label = "cpu";
              ethernet = <&gmac1>;
              phy-mode = "2500base-x";
              fixed-link {
              speed = <2500>;
              full-duplex;
              pause;
              };
             status = "okay";
            };
          port@1 { reg = <1>; label = "lan2"; status = "okay"; };
          port@2 { reg = <2>; label = "lan3"; status = "okay"; };
          port@3 { reg = <3>; label = "lan4"; status = "okay"; };
          port@4 { reg = <4>; label = "lan5"; status = "okay"; };
           };
          };
          EOF
          fi

          # 添加设备定义到 filogic.mk
          if ! grep -q "mediatek_mt7986a-s20plus" target/linux/mediatek/image/filogic.mk; then
            cat >> target/linux/mediatek/image/filogic.mk << 'EOF'
            define Device/mediatek_mt7986a-s20plus
            FILESYSTEMS := squashfs  # 启用 squashfs 叠加文件系统
            IMAGE_SIZE := 15360k     # 适配 128G EMMC 的分区大小
            DEVICE_VENDOR := S20PLUS
            DEVICE_MODEL := MT7986A-S20PLUS
            DEVICE_DTS := mt7986a-s20plus
            DEVICE_PACKAGES := kmod-mt7531 kmod-rtl8221 kmod-phy-realtek kmod-usb3 kmod-ethtool
          # 关键：启用可写 overlay 分区，解决配置无法保存问题
            CONFIG_TARGET_ROOTFS_OVERLAY := y
            endef
            TARGET_DEVICES += mediatek_mt7986a-s20plus
          EOF
            echo "==== S20PLUS 设备定义已添加 ===="
          fi

      - name: Write S20PLUS .config (修复 overlay 配置)
        run: |
          cat > .config << 'EOF'
           CONFIG_TARGET_mediatek=y
           CONFIG_TARGET_mediatek_filogic=y
           CONFIG_TARGET_MEDIATEK_FILOGIC_MT7986A=y
           CONFIG_TARGET_mediatek_filogic_DEVICE_mediatek_mt7986a-s20plus=y
           CONFIG_TARGET_BOARD="filogic"
           CONFIG_TARGET_SUBTARGET="filogic"
           CONFIG_TARGET_PROFILE="DEFAULT"
           CONFIG_TARGET_ARCH_PACKAGES="aarch64_cortex-a53"
           CONFIG_TARGET_KERNEL_PARTSIZE=512
           CONFIG_TARGET_ROOTFS_PARTSIZE=102400  # 根分区大小适配 128G EMMC
           CONFIG_TARGET_ROOTFS_SQUASHFS=y        # 启用 squashfs 文件系统
           CONFIG_TARGET_ROOTFS_OVERLAY=y         # 启用可写 overlay 分区（核心修复项）
           CONFIG_TARGET_OVERLAY_FS=y             # 强制启用 overlay 文件系统
           CONFIG_PACKAGE_kmod-mmc=y
           CONFIG_PACKAGE_kmod-sdhci=y
           CONFIG_PACKAGE_e2fsprogs=y
           CONFIG_PACKAGE_kmod-fs-ext4=y
           CONFIG_PACKAGE_kmod-fs-ntfs3=y
           CONFIG_PACKAGE_kmod-usb3=y
           CONFIG_PACKAGE_kmod-usb-dwc3=y
           CONFIG_PACKAGE_kmod-usb-xhci=y
           CONFIG_PACKAGE_kmod-usb-storage=y
           CONFIG_PACKAGE_kmod-mt7530=y
           CONFIG_PACKAGE_kmod-mt7531=y
           CONFIG_PACKAGE_kmod-switch-mt7530=y
           CONFIG_PACKAGE_swconfig=y
           CONFIG_PACKAGE_kmod-libphy=y
           CONFIG_PACKAGE_kmod-rtl8221=y
           CONFIG_PACKAGE_kmod-phy-realtek=y
           CONFIG_PACKAGE_kmod-mdio-gpio=y
           CONFIG_PACKAGE_kmod-of-mdio=y
           CONFIG_PACKAGE_ethtool=y
           CONFIG_PACKAGE_ip-full=y
           CONFIG_PACKAGE_iproute2=y
           CONFIG_PACKAGE_dnsmasq-full=y
           CONFIG_PACKAGE_firewall=y
           CONFIG_PACKAGE_bridge=y
           CONFIG_PACKAGE_luci=y
           CONFIG_PACKAGE_luci-theme-argon=y
           CONFIG_PACKAGE_luci-app-firewall=y
           CONFIG_PACKAGE_luci-proto-pppoe=y
           CONFIG_DEVEL=y
           CONFIG_TOOLCHAINOPTS=y
           CONFIG_BUSYBOX_CUSTOM=y
           CONFIG_KERNEL_SWAP=y
           CONFIG_KERNEL_VMSPLIT_3G=y
           CONFIG_CCACHE=y
          EOF
        
          # 生成最终配置并校验
          make defconfig || true
          echo "==== 配置校验 ===="
          grep -E "s20plus|mt7986|mt7531|rtl8221|phy-realtek|overlay|squashfs" .config || true

      - name: Pre-download Dependencies
        run: |
          make download -j$(nproc) V=s || make download -j1 V=s
          rm -rf ./tmp/* || true

      - name: Build S20PLUS Firmware
        timeout-minutes: 240
        run: |
          export MAKEFLAGS="-j$(nproc) -l$(nproc)"  # 优化编译线程数
          export CCACHE_DIR=/tmp/ccache
          mkdir -p $CCACHE_DIR
          make -j$(nproc) V=s || {
            echo "==== 编译失败，单线程重试 ===="
            make clean
            make -j1 V=s
          }

      - name: Package Artifacts
        run: |
          mkdir -p artifact
          # 复制固件产物
          cp -rf bin/targets/mediatek/filogic/*.bin artifact/ 2>/dev/null || true
          cp -rf bin/targets/mediatek/filogic/*.img.gz artifact/ 2>/dev/null || true
          cp -rf bin/targets/mediatek/filogic/*.manifest artifact/ 2>/dev/null || true
          # 复制配置文件和日志
          cp .config artifact/S20PLUS-LEDE-config.txt 2>/dev/null || true
          dmesg > artifact/dmesg.log 2>/dev/null || true
          # 列出产物
          ls -lh artifact/ || true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2.0.4
        if: always()  # 即使编译失败也上传产物
        with:
          tag_name: LEDE-S20PLUS-${{ github.run_id }}
          name: LEDE S20PLUS MT7986A 2×2.5G+5×1G 128G EMMC
          files: ./artifact/*
          body: |
            ## LEDE 固件（S20PLUS 专属）
            ### 硬件适配
            - CPU: MT7986A (Filogic 830)
            - 内存: 2G RAM
            - 存储: 128G EMMC
            - 网口: WAN2.5G + LAN2.5G + 5×1G
            - 扩展: USB3.0
            ### 核心特性
            1. 完整 2.5G 网口驱动适配
            2. 8G SWAP 优化内存占用
            3. CCACHE 编译缓存加速
            4. 修复 overlay 分区问题，支持配置永久保存
            5. 编译失败自动单线程重试

      - name: Cleanup
        if: always()
        run: |
          sudo swapoff /mnt/swapfile
          sudo rm -rf /mnt/swapfile
          rm -rf ./artifact ./tmp
