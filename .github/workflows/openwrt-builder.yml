name: Build OpenWrt for MT7986A

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config/.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  TZ: Asia/Shanghai
  # 强制使用 Node.js 24，解决弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4  # 升级到支持 Node.js 24 的版本

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 替换 Ubuntu 系统源为阿里云，加速依赖安装
        sudo sed -i 's/archive.ubuntu.com/mirrors.aliyun.com/g' /etc/apt/sources.list
        sudo sed -i 's/security.ubuntu.com/mirrors.aliyun.com/g' /etc/apt/sources.list
        # 更新系统并安装依赖
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget libelf-dev libtool-bin autoconf automake texinfo patch pkg-config libglib2.0-dev libfuse-dev python3-pip python3-setuptools swig
        sudo apt autoremove -y && sudo apt clean -y
        # 增加 10G 交换分区，避免内存不足
        sudo fallocate -l 10G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile

    - name: Clone source code
      run: |
        # 克隆源码时增加超时重试，使用国内镜像加速
        git clone --depth=1 --retry 5 --timeout=300 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        # 替换 feeds 源为国内镜像（多源备份，避免单源失败）
        sed -i '/^src-git/d' feeds.conf.default
        cat >> feeds.conf.default << EOF
        src-git packages https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/packages.git
        src-git luci https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/luci.git
        src-git routing https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/routing.git
        src-git telephony https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/telephony.git
        src-git kenzo https://github.com/kenzok8/openwrt-packages
        src-git small https://github.com/kenzok8/small
        EOF
        # 更新 feeds 时增加重试
        ./scripts/feeds update -a || ./scripts/feeds update -a || ./scripts/feeds update -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P1_SH $DIY_P2_SH
        cd openwrt
        ../$DIY_P1_SH
        # 硬件适配配置（2G/128G/USB3.0/MT7986A）
        cat >> .config << EOF
        CONFIG_KERNEL_HUGETLB_PAGE=y
        CONFIG_KERNEL_SWAP=y
        CONFIG_KERNEL_ZSWAP=y
        CONFIG_PACKAGE_kmod-mmc=y
        CONFIG_PACKAGE_kmod-block2mtd=y
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_kmod-fs-ntfs3=y
        CONFIG_PACKAGE_kmod-fs-exfat=y
        CONFIG_PACKAGE_kmod-usb3=y
        CONFIG_PACKAGE_kmod-usb-storage=y
        CONFIG_PACKAGE_kmod-usb-storage-uas=y
        CONFIG_PACKAGE_usbmount=y
        CONFIG_PACKAGE_kmod-mt7530=y
        CONFIG_PACKAGE_kmod-switch=y
        CONFIG_PACKAGE_kmod-switchdev=y
        CONFIG_PACKAGE_kmod-realtek-mdio=y
        CONFIG_PACKAGE_kmod-phy-realtek=y
        CONFIG_PACKAGE_swconfig=y
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        EOF
        make defconfig

    - name: Download packages
      run: |
        cd openwrt
        # 下载依赖包时增加重试次数，降低并发（避免网络过载）
        make download -j4 || make download -j2 || make download -j1
        # 删除空文件，避免编译报错
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build firmware
      run: |
        cd openwrt
        # 降低编译并发，提升稳定性（适配 2G 内存）
        make -j4 V=s || make -j2 V=s || make -j1 V=s
        echo "======================="
        echo "Build firmware finished!"
        echo "======================="

    - name: Upload firmware to release
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      uses: softprops/action-gh-release@v2  # 升级到支持 Node.js 24 的版本
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: openwrt/bin/targets/**/*.bin
        tag_name: MT7986A-LEDE-2G-128G-$(date +%Y%m%d)
