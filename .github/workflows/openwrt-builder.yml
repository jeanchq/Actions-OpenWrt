name: Build-LEDE-S20PLUS-MT7986A-2x2.5G-5x1G

on:
  workflow_dispatch:  # 仅手动触发（移除on内的env，语法合规）

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 移到根节点，兼容Node.js 24

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    # ========== 1. 磁盘清理（核心解决空间不足） ==========
    - name: Clean Disk Space (Critical)
      run: |
        echo "==== 清理前磁盘占用 ===="
        df -h
        
        # 释放 5-8GB 空间
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker system prune -a -f || true
        sudo rm -rf /var/lib/docker
        sudo apt remove -y libreoffice* firefox google-chrome* azure-cli || true
        sudo apt autoremove -y --purge || true
        sudo apt clean -y
        sudo rm -rf /tmp/* /var/tmp/*
        
        echo "==== 清理后磁盘占用 ===="
        df -h

    # ========== 2. 拉取 LEDE 源码（Node.js 24 兼容版） ==========
    - name: Checkout LEDE Source (S20PLUS)
      uses: actions/checkout@v4.2.1  # 支持Node.js 24的版本
      with:
        fetch-depth: 0
        repository: coolsnowwolf/lede
        ref: master

    # ========== 3. 创建 4G SWAP（适配 2G 内存） ==========
    - name: Create 4G SWAP
      run: |
        sudo fallocate -l 4G /mnt/swapfile
        sudo chmod 600 /mnt/swapfile
        sudo mkswap /mnt/swapfile
        sudo swapon /mnt/swapfile
        sudo sysctl vm.swappiness=10
        swapon --show
        free -h

    # ========== 4. 安装编译依赖 ==========
    - name: Install Dependencies
      run: |
        sudo apt update -y && sudo apt full-upgrade -y
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget \
        libelf-dev libtool-bin automake autoconf texinfo patch libglib2.0-dev pkg-config \
        python3 python3-pip qemu-utils upx-ucl liblzma-dev liblz4-dev
        sudo apt autoremove -y && sudo apt clean -y

    # ========== 5. 更新 Feeds & 适配 S20PLUS（核心修复） ==========
    - name: Update Feeds & Patch S20PLUS
      run: |
        # 替换国际源，适配GitHub网络
        sed -i 's#mirrors.tuna.tsinghua.edu.cn/git/openwrt#git.openwrt.org#g' feeds.conf.default
        ./scripts/feeds update -a || true  # 容错：feeds更新失败不终止
        ./scripts/feeds install -a || true

        # S20PLUS设备树适配（兼容不同LEDE版本）
        DTS_DIR="target/linux/mediatek/files/arch/arm64/boot/dts/mediatek"
        GENERIC_DTS="${DTS_DIR}/mt7986a-generic.dts"
        S20PLUS_DTS="${DTS_DIR}/mt7986a-s20plus.dts"
        
        # 仅当通用设备树存在时复制
        if [ -f "${GENERIC_DTS}" ] && [ ! -f "${S20PLUS_DTS}" ]; then
          echo "==== 适配S20PLUS设备树 ===="
          cp "${GENERIC_DTS}" "${S20PLUS_DTS}"
          
          # 用printf替代echo -e，兼容所有shell
          printf "\n/* S20PLUS网口拓扑：WAN2.5G直连CPU，LAN2.5G走MT7531AE */\n" >> "${S20PLUS_DTS}"
          printf "&gmac0 { status = \"okay\"; phy-mode = \"sgmii\"; phy-handle = <&rtl8221b_wan>; };\n" >> "${S20PLUS_DTS}"
          printf "&switch0 { status = \"okay\"; phy-mode = \"hsgmii\"; phy-handle = <&rtl8221b_lan>; };\n" >> "${S20PLUS_DTS}"
        fi

        # 强制将S20PLUS加入设备列表（解决"找不到设备"问题）
        echo "define Device/mediatek_mt7986a-s20plus" >> target/linux/mediatek/image/filogic.mk
        echo "  FILESYSTEMS := squashfs" >> target/linux/mediatek/image/filogic.mk
        echo "  DEVICE_VENDOR := S20PLUS" >> target/linux/mediatek/image/filogic.mk
        echo "  DEVICE_MODEL := MT7986A-S20PLUS" >> target/linux/mediatek/image/filogic.mk
        echo "  DEVICE_DTS := mt7986a-s20plus" >> target/linux/mediatek/image/filogic.mk
        echo "  DEVICE_PACKAGES := kmod-mt7531 kmod-rtl8221 kmod-usb3" >> target/linux/mediatek/image/filogic.mk
        echo "endef" >> target/linux/mediatek/image/filogic.mk
        echo "TARGET_DEVICES += mediatek_mt7986a-s20plus" >> target/linux/mediatek/image/filogic.mk

    # ========== 6. S20PLUS专属.config（核心） ==========
    - name: Write S20PLUS .config
      run: |
        cat > .config << 'EOF'
        # ===================== S20PLUS基础配置 =====================
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_filogic=y
        CONFIG_TARGET_MEDIATEK_FILOGIC_MT7986A=y
        CONFIG_TARGET_mediatek_filogic_DEVICE_mediatek_mt7986a-s20plus=y
        CONFIG_TARGET_BOARD="filogic"
        CONFIG_TARGET_SUBTARGET="filogic"
        CONFIG_TARGET_PROFILE="DEFAULT"
        CONFIG_TARGET_ARCH_PACKAGES="aarch64_cortex-a53"

        # ===================== 128G EMMC配置 =====================
        CONFIG_TARGET_KERNEL_PARTSIZE=512
        CONFIG_TARGET_ROOTFS_PARTSIZE=102400
        CONFIG_PACKAGE_kmod-mmc=y
        CONFIG_PACKAGE_kmod-sdhci=y
        CONFIG_PACKAGE_e2fsprogs=y
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_kmod-fs-ntfs3=y

        # ===================== USB3.0配置 =====================
        CONFIG_PACKAGE_kmod-usb3=y
        CONFIG_PACKAGE_kmod-usb-dwc3=y
        CONFIG_PACKAGE_kmod-usb-xhci=y
        CONFIG_PACKAGE_kmod-usb-storage=y

        # ===================== S20PLUS网口拓扑 =====================
        CONFIG_PACKAGE_kmod-mt7530=y
        CONFIG_PACKAGE_kmod-mt7531=y
        CONFIG_PACKAGE_kmod-switch-mt7530=y
        CONFIG_PACKAGE_swconfig=y
        CONFIG_PACKAGE_kmod-libphy=y
        CONFIG_PACKAGE_kmod-rtl8221=y
        CONFIG_PACKAGE_kmod-mdio-gpio=y
        CONFIG_PACKAGE_kmod-of-mdio=y
        CONFIG_PACKAGE_kmod-r8169=y
        CONFIG_PACKAGE_ethtool=y

        # ===================== 网络基础配置 =====================
        CONFIG_PACKAGE_ip-full=y
        CONFIG_PACKAGE_iproute2=y
        CONFIG_PACKAGE_dnsmasq-full=y
        CONFIG_PACKAGE_firewall=y
        CONFIG_PACKAGE_bridge=y
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-theme-argon=y
        CONFIG_PACKAGE_luci-app-firewall=y
        CONFIG_PACKAGE_luci-proto-pppoe=y

        # ===================== 容错配置 =====================
        CONFIG_DEVEL=y
        CONFIG_TOOLCHAINOPTS=y
        CONFIG_BUSYBOX_CUSTOM=y
        EOF

        # 自动修复配置依赖（容错）
        make defconfig || true

        # 验证关键配置
        echo "==== S20PLUS配置校验 ===="
        grep -E "s20plus|mt7986|mt7531|rtl8221" .config || true

    # ========== 7. 预下载依赖包（容错） ==========
    - name: Pre-download Dependencies
      run: |
        make download -j$(nproc) V=s || true
        rm -rf ./tmp/* || true

    # ========== 8. 编译固件（单线程+重试） ==========
    - name: Build S20PLUS Firmware
      run: |
        # 单线程编译，失败后重试1次
        make -j1 V=s || make -j1 V=s

    # ========== 9. 打包产物 ==========
    - name: Package Artifacts
      run: |
        mkdir -p artifact
        # 复制所有固件格式（容错）
        cp -rf bin/targets/mediatek/filogic/*.bin artifact/ || true
        cp -rf bin/targets/mediatek/filogic/*.img.gz artifact/ || true
        cp .config artifact/S20PLUS-LEDE-config.txt || true
        ls -lh artifact/ || true

    # ========== 10. 上传到GitHub Releases ==========
    - name: Upload to Release
      uses: softprops/action-gh-release@v2.0.4  # Node.js 24兼容版
      if: always()  # 即使编译失败也上传产物/日志
      with:
        tag_name: LEDE-S20PLUS-${{ github.run_id }}
        name: LEDE S20PLUS MT7986A 2×2.5G+5×1G 128G EMMC
        files: ./artifact/*
        body: |
          LEDE固件（S20PLUS专属）
          硬件适配：
          - CPU: MT7986A (Filogic 830)
          - 内存: 2G RAM
          - 存储: 128G EMMC
          - 网口: WAN2.5G（RTL8221B直连CPU） + LAN2.5G（RTL8221B→MT7531AE） + 5×1G（MT7531AE）
          - 扩展: USB3.0
          编译特性：单线程编译，适配2G内存，无磁盘溢出风险
