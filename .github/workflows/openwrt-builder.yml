name: Build-ImmortalWrt-S20PLUS-MT7986A-WIRED-FINAL

on:
  workflow_dispatch:
    inputs:
      ssh_debug:
        description: 'Enable SSH Debug Session'
        required: false
        default: 'false'

env:
  REPO_BRANCH: master
  CONFIG_FILE: .config
  # 【新增】强制使用 Node.js 24 运行 JS Actions，消除警告并面向未来
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/*
          sudo docker system prune -a -f --volumes || true
          sudo apt remove -y --purge azure-cli google-chrome-stable firefox mono-devel libgl1-mesa-dri || true
          sudo apt autoremove -y --purge
          sudo apt clean
          df -h

      - name: Create 8G SWAP
        run: |
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          echo "vm.swappiness=10" | sudo tee -a /etc/sysctl.conf
          free -h

      - name: Checkout Source
        uses: actions/checkout@v5
        with:
          repository: immortalwrt/immortalwrt
          ref: ${{ env.REPO_BRANCH }}
          fetch-depth: 0

      - name: Cache Feeds & DL
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            dl
            feeds
            ~/.ccache
          key: immortalwrt-mt7986-${{ runner.os }}-${{ hashFiles('scripts/feeds') }}
          restore-keys: |
            immortalwrt-mt7986-${{ runner.os }}-

      - name: Install Dependencies
        run: |
          sudo apt update
          # 【修正】移除 libucontext-dev，增加 flex bison，添加 --fix-missing
          sudo apt install -y --fix-missing build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libssl-dev python3 python3-distutils python3-setuptools \
          python3-dev rsync subversion swig time xsltproc zlib1g-dev wget \
          unzip zip libfuse-dev meson ninja-build qemu-utils \
          libgmp3-dev libmpc-dev libmpfr-dev libzstd-dev device-tree-compiler \
          curl flex bison

      - name: Apply Customizations & Config
        run: |
           # 1. Update Feeds
           ./scripts/feeds update -a
           ./scripts/feeds install -a
       
           # 2. 如果有自定义 dts 文件，在此添加
           # mkdir -p target/linux/mediatek/dts
           # cp $GITHUB_WORKSPACE/s20plus.dts target/linux/mediatek/dts/

           # 3. Generate .config
            cat > .config << EOF
            CONFIG_TARGET_mediatek=y
            CONFIG_TARGET_mediatek_filogic=y
        
           # 使用 BPI-R4 配置（MT7986A + 2.5G 网口）
           CONFIG_TARGET_mediatek_filogic_DEVICE_bananapi_bpi-r4=y
           CONFIG_TARGET_BOARD="mediatek"
           CONFIG_TARGET_SUBTARGET="filogic"
           
           # Kernel Features
           CONFIG_KERNEL_SWAP=y
           CONFIG_KERNEL_HUGETLBFS=y
           CONFIG_KERNEL_TRANSPARENT_HUGEPAGE=y
           CONFIG_KERNEL_CGROUP_FREEZER=y
           CONFIG_KERNEL_TCP_CONG_BBR=y
           CONFIG_DEFAULT_tcp_bbr=y
           
           # Filesystem for 128G EMMC
           CONFIG_TARGET_ROOTFS_EXT4FS=y
           CONFIG_TARGET_ROOTFS_SQUASHFS=y
           CONFIG_TARGET_IMAGES_GZIP=n
           CONFIG_TARGET_ROOTFS_PARTSIZE=10240
           CONFIG_PACKAGE_block-mount=y
           CONFIG_PACKAGE_kmod-fs-ext4=y
           CONFIG_PACKAGE_kmod-fs-ntfs=y
           CONFIG_PACKAGE_ntfs-3g=y
           CONFIG_PACKAGE_kmod-fs-f2fs=y
           CONFIG_PACKAGE_mkf2fs=y
           
           # USB 3.0 Full Stack
           CONFIG_PACKAGE_kmod-usb-core=y
           CONFIG_PACKAGE_kmod-usb-xhci-hcd=y
           CONFIG_PACKAGE_kmod-usb-storage=y
           CONFIG_PACKAGE_kmod-usb-storage-uas=y
           CONFIG_PACKAGE_kmod-usb3=y
           CONFIG_PACKAGE_kmod-usb-net=y
           CONFIG_PACKAGE_kmod-usb-net-rtl8152=y
           CONFIG_PACKAGE_kmod-usb-ledtrig-usbport=y
           
           # Network Drivers (MT7531AE + RTL8221B)
           CONFIG_PACKAGE_kmod-mt7530=y
           CONFIG_PACKAGE_kmod-dsa=y
           CONFIG_PACKAGE_kmod-phy-realtek=y
           CONFIG_PACKAGE_ethtool=y
           CONFIG_PACKAGE_ip-full=y
           CONFIG_PACKAGE_iwinfo=y
           
           # LuCI Base
           CONFIG_PACKAGE_luci=y
           CONFIG_PACKAGE_luci-base=y
           CONFIG_PACKAGE_luci-app-opkg=y
           CONFIG_PACKAGE_luci-theme-argon=y
           CONFIG_PACKAGE_luci-app-diskman=y
           CONFIG_PACKAGE_luci-app-samba4=y
           CONFIG_PACKAGE_luci-app-wol=y
           
           # DISABLE WIRELESS - 通过取消选择无线相关包实现
           # 注意：BPI-R4 默认可能有无线，需要显式禁用
           CONFIG_PACKAGE_mac80211=n
           CONFIG_PACKAGE_wpad-basic=n
           CONFIG_PACKAGE_hostapd=n
           CONFIG_PACKAGE_iw=n
           
           # Optimization
           CONFIG_DEVEL=y
           CONFIG_CCACHE=y
           CONFIG_AUTOREMOVE=n
           CONFIG_ALL_NONSHARED=n
           EOF

           make defconfig

      - name: Pre-download Sources
        run: |
          make download -j$(nproc) V=s || make download -j1 V=s
          find dl -size -1024c -exec ls -l {} \;

      - name: Compile Firmware
        timeout-minutes: 300
        run: |
          export MAKEFLAGS="-j2" 
          make V=s 2>&1 | tee build.log
      
      - name: Check Build Status
        run: |
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Build Failed! Checking logs..."
            tail -n 100 build.log
            exit 1
          fi
          ls -lh bin/targets/mediatek/filogic/

      - name: Check Build Output (Debug)
        run: |
          echo "=== Checking build output directory ==="
          ls -lh bin/targets/mediatek/filogic/ || echo "Directory empty or missing!"
          echo "=== Finding all image files ==="
          find bin/targets -name "*.img*" -o -name "*.itb" | head -20

      - name: Prepare Artifacts
        run: |
          mkdir -p release_files
          
          # 【修正】定义源目录
          SRC_DIR="bin/targets/mediatek/filogic"
          
          # 【修正】尝试复制所有可能的镜像文件，而不是硬编码特定名称
          # 这样即使文件名稍有不同也能捕获
          cp $SRC_DIR/*ext4*.img.gz release_files/ 2>/dev/null || true
          cp $SRC_DIR/*squashfs*.img.gz release_files/ 2>/dev/null || true
          cp $SRC_DIR/*combined*.img.gz release_files/ 2>/dev/null || true
          cp $SRC_DIR/*.itb release_files/ 2>/dev/null || true
          
          # 检查是否复制到了任何文件
          FILE_COUNT=$(ls -1 release_files/ 2>/dev/null | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::No firmware images found in $SRC_DIR! Build might have failed silently or config is wrong."
            ls -lh $SRC_DIR/
            exit 1
          fi
          
          echo "Successfully found $FILE_COUNT files."
          
          # 重命名文件
          cd release_files
          for f in *; do 
            # 避免重复重命名
            if [[ "$f" != *"S20PLUS"* ]]; then
              mv "$f" "S20PLUS_MT7986A_WIRED_${f}"
              echo "Renamed $f to S20PLUS_MT7986A_WIRED_${f}"
            fi
          done
          cd ..
          
          # 复制配置文件和日志
          cp .config release_files/
          if [ -f build.log ]; then
            cp build.log release_files/
          fi
          
          ls -lh release_files/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: S20PLUS-WIRED-${{ github.run_id }}
          name: "S20PLUS MT7986A 纯有线优化版 (Final No-WiFi)"
          files: ./release_files/*
          body: |
            ### 🚀 S20PLUS MT7986A 定制固件
            - **核心**: ImmortalWrt Master
            - **硬件**: MT7986A + MT7531AE + RTL8221B (2.5G)
            - **特性**: **彻底禁用 WiFi**, 128G EMMC 支持, BBR, USB3.0
            - **注意**: 刷入后请执行 `resize2fs` 扩容。

      - name: Cleanup
        if: always()
        run: |
          sudo swapoff /mnt/swapfile || true
          rm -rf ./release_files
