name: Build OpenWrt for MT7986A

on:
  repository_dispatch:
  workflow_dispatch:  # 手动触发编译（关键，支持点击启动）

env:
  REPO_URL: https://github.com/coolsnowwolf/lede  # Lean 版 LEDE 源码
  REPO_BRANCH: master  # LEDE 主分支
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config/.config  # 指向你上传的 .config 文件
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true  # 编译完成后上传固件到 Releases
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  TZ: Asia/Shanghai  # 时区，避免编译时间异常

jobs:
  build:
    runs-on: ubuntu-22.04  # 云端 Linux 系统（推荐 22.04）
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget libelf-dev libtool-bin autoconf automake texinfo patch pkg-config libglib2.0-dev libfuse-dev python3-pip python3-setuptools swig
        sudo apt autoremove -y && sudo apt clean -y
        # 增加交换分区（避免云端内存不足）
        sudo fallocate -l 8G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        # 替换国内源，加速下载
        sed -i 's#https://github.com#https://mirror.ghproxy.com/https://github.com#g' ./feeds.conf.default
        ./scripts/feeds update -a && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P1_SH $DIY_P2_SH
        cd openwrt
        ../$DIY_P1_SH
        make defconfig

    - name: Download packages
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build firmware
      run: |
        cd openwrt
        echo -e "$(nproc) thread build."
        make -j$(nproc) V=s || make -j1 V=s  # 失败时单线程编译，方便查错
        echo "======================="
        echo "Build firmware finished!"
        echo "======================="

    - name: Upload firmware to release
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      uses: softprops/action-gh-release@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: openwrt/bin/targets/**/*.bin
        tag_name: MT7986A-LEDE-$(date +%Y%m%d)
