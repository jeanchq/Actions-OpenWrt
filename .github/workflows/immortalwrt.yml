name: Compile ImmortalWrt for MT6000 (2G+128G)

on:
  workflow_dispatch:  # 仅保留手动触发（推荐）

permissions:
  contents: write
  actions: read

jobs:
  compile-firmware:
    runs-on: ubuntu-22.04
    steps:
      # 步骤1：配置编译环境（无修改）
      - name: Prepare build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget curl libelf-dev libncursesw5-dev pkg-config python3-pip qemu-utils \
            python3-pyelftools swig subversion time upx-ucl uuid-dev

      # 步骤2：克隆 ImmortalWrt 源码
      - name: Clone ImmortalWrt source code
        run: |
          git clone --depth=1 --single-branch https://github.com/immortalwrt/immortalwrt.git immortalwrt
          cd immortalwrt
          # 可选：切换稳定分支
          # git checkout openwrt-23.05

      # 步骤3：核心修改：调整 MT6000 内存和 EMMC 配置
      - name: Modify MT6000 memory (2G) and EMMC (128G)
        run: |
          cd immortalwrt
          # --------------------------
          # 1. 修改设备树文件（内存配置）
          # --------------------------
          # MT6000 设备树路径：target/linux/mediatek/dts/mt7986a-mt6000.dts
          DTS_FILE="target/linux/mediatek/dts/mt7986a-mt6000.dts"
          # 替换内存配置为 2GB（原默认 1GB）
          # memory@40000000 { reg = <0x40000000 0x80000000>; } 对应 2GB
          sed -i 's/memory@40000000 { reg = <0x40000000 0x40000000>; }/memory@40000000 { reg = <0x40000000 0x80000000>; }/g' $DTS_FILE
          
          # --------------------------
          # 2. 修改分区表（128G EMMC）
          # --------------------------
          # MT6000 分区配置路径：target/linux/mediatek/image/mt798x.mk
          PARTITION_FILE="target/linux/mediatek/image/mt798x.mk"
          # 注释原 128MB/256MB 分区配置，新增 128G 适配
          # 核心调整：扩大 rootfs 分区到 120G（预留 8G 给其他分区）
          sed -i '/mt6000/s/128m/120g/g' $PARTITION_FILE
          sed -i '/mt6000/s/256m/120g/g' $PARTITION_FILE
          # 补充 EMMC 分区表参数（确保识别 128G 存储）
          echo 'define Device/mt6000
            $(Device/uimage-factory)
            IMAGE_SIZE := 120160000k  # 120G 分区大小（适配 128G EMMC）
            DEVICE_VENDOR := Xiaomi
            DEVICE_MODEL := MT6000
            DEVICE_DTS := mt7986a-mt6000
            DEVICE_PACKAGES := kmod-mt7986-firmware mt7986-firmware luci
            BLOCKSIZE := 128k
            PAGESIZE := 2048
          endef
          TARGET_DEVICES += mt6000' >> $PARTITION_FILE

      # 步骤4：加载并更新 MT6000 配置
      - name: Load MT6000 defconfig
        run: |
          cd immortalwrt
          cp configs/templates/mediatek/mt798x/mt6000.config .config
          # 强制启用大内存支持
          echo 'CONFIG_TARGET_MEMORY_PROFILE_2048=y' >> .config
          echo 'CONFIG_LINUX_KERNEL_MEMORY_SIZE=2048' >> .config
          # 启用 EMMC 大容量分区支持
          echo 'CONFIG_PACKAGE_kmod-mmc=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-sdhci-mt7622=y' >> .config
          make defconfig

      # 步骤5：下载依赖（无修改）
      - name: Download dependencies
        run: |
          cd immortalwrt
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      # 步骤6：编译固件（无修改）
      - name: Compile firmware
        run: |
          cd immortalwrt
          make -j$(($(nproc) + 1)) || make -j1 V=s
          ls -lh bin/targets/mediatek/mt798x/

      # 步骤7：上传产物（无修改）
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mt6000-immortalwrt-2g-128g-firmware
          path: immortalwrt/bin/targets/mediatek/mt798x/
          retention-days: 30

      # 步骤8：可选上传到 Release
      - name: Create Release and upload firmware
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mt6000-2g-128g-${{ github.run_id }}
          name: MT6000 (2G+128G) ImmortalWrt ${{ github.run_id }}
          files: immortalwrt/bin/targets/mediatek/mt798x/*
          body: |
            ImmortalWrt for MT6000 (2GB RAM + 128GB EMMC)
            - Compile time: ${{ github.run_at }}
            - Memory: 2GB
            - EMMC: 128GB (rootfs: 120GB)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
