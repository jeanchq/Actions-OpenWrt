name: Build S20P

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev git python3

      - name: 拉取 237 源码
        run: |
          git clone https://github.com/padavanonly/immortalwrt-mt798x-6.6
          cd immortalwrt-mt798x-6.6
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 选择 S20P 配置
        run: |
          cd immortalwrt-mt798x-6.6
          make menuconfig defconfig
          echo "CONFIG_TARGET_mediatek=y" > .config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_clx_s20p=y" >> .config

      - name: 开始编译（关键 -j1）
        run: |
          cd immortalwrt-mt798x-6.6
          make -j1 V=s
