name: Compile GL.iNet GL-MT6000 (2G+128G+MT7531AE)

on:
  workflow_dispatch:  # 仅手动触发，避免误编译

permissions:
  contents: write
  actions: read

jobs:
  compile-firmware:
    runs-on: ubuntu-22.04
    steps:
      # 1. 配置编译环境（最小化依赖，加速安装）
      - name: Prepare build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt update -y && sudo apt full-upgrade -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget curl libelf-dev libncursesw5-dev pkg-config python3-pip qemu-utils \
            python3-pyelftools swig subversion time upx-ucl uuid-dev
          sudo apt autoremove -y && sudo apt clean -y

      # 2. 克隆 ImmortalWrt 源码（GL-MT6000 稳定分支）
      - name: Clone ImmortalWrt source code
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git immortalwrt
          cd immortalwrt
          git checkout openwrt-23.05  # 对 GL-MT6000 支持最完善的分支
          git submodule update --init --recursive  # 拉取驱动子模块

      # 3. 核心修改：2G内存 + 128G eMMC + MT7531AE 适配
      - name: Modify GL-MT6000 hardware config
        run: |
          cd immortalwrt
          # --------------------------
          # 3.1 适配 2GB 内存（修改设备树）
          # --------------------------
          DTS_FILE=$(find target/linux/mediatek/dts -name "*gl-mt6000*.dts" | head -1)
          if [ -z "$DTS_FILE" ]; then
            DTS_FILE=$(find target/linux/mediatek/dts -name "*mt7986a-mt6000*.dts" | head -1)
          fi
          echo "Using DTS file: $DTS_FILE"
          # 内存配置：0x80000000 = 2GB
          sed -i '/memory@40000000/ s/reg = <0x40000000 [0-9a-f]*>/reg = <0x40000000 0x80000000>/g' $DTS_FILE
          # MT7531AE 交换机：强制 RGMII 高速模式
          sed -i '/phy-mode = .*/c\                phy-mode = "rgmii";' $DTS_FILE

          # --------------------------
          # 3.2 适配 128G eMMC（修改分区表）
          # --------------------------
          PARTITION_FILE="target/linux/mediatek/image/mt798x.mk"
          cp $PARTITION_FILE ${PARTITION_FILE}.bak  # 备份原文件
          
          # 新增/修改 GL-MT6000 设备定义（128G eMMC + MT7531AE）
          if grep -q "gl-mt6000" $PARTITION_FILE; then
            # 替换现有配置
            sed -i '/DEVICE_MODEL := GL-MT6000/,/endef/ c\define Device/gl-mt6000
            \$(Device/uimage-factory)
            IMAGE_SIZE := 118000000k
            DEVICE_VENDOR := GL.iNet
            DEVICE_MODEL := GL-MT6000
            DEVICE_DTS := mt7986a-glinet-gl-mt6000
            DEVICE_ALT0_VENDOR := GL.iNet
            DEVICE_ALT0_MODEL := GL-MT6000
            DEVICE_ALT0_VARIANT := eMMC-128G
            DEVICE_PACKAGES := kmod-mt7986-firmware mt7986-firmware kmod-switch-mt7531 mt7531-firmware \
                     kmod-mmc kmod-sdhci-mt7622 luci luci-i18n-base-zh-cn
            BLOCKSIZE := 128k
            PAGESIZE := 2048
            SUBPAGESIZE := 2048
            endef' $PARTITION_FILE
          else
            # 新增配置
            cat >> $PARTITION_FILE << EOF
            
            # GL-MT6000 (2G+128G eMMC+MT7531AE) Custom Config
            define Device/gl-mt6000
            \$(Device/uimage-factory)
            IMAGE_SIZE := 118000000k  # 118G rootfs（128G eMMC 预留 10G）
            DEVICE_VENDOR := GL.iNet
            DEVICE_MODEL := GL-MT6000
            DEVICE_DTS := mt7986a-glinet-gl-mt6000
            DEVICE_ALT0_VENDOR := GL.iNet
            DEVICE_ALT0_MODEL := GL-MT6000
            DEVICE_ALT0_VARIANT := eMMC-128G
            # 核心驱动：MT7531AE + eMMC + 基础组件
            DEVICE_PACKAGES := kmod-mt7986-firmware mt7986-firmware kmod-switch-mt7531 mt7531-firmware \
                     kmod-mmc kmod-sdhci-mt7622 luci luci-i18n-base-zh-cn
            BLOCKSIZE := 128k
            PAGESIZE := 2048
            SUBPAGESIZE := 2048
          endef
          TARGET_DEVICES += gl-mt6000
          EOF
          fi

      # 4. 加载并优化 GL-MT6000 配置
      - name: Load GL-MT6000 defconfig
        run: |
          cd immortalwrt
          # 加载 GL-MT6000 配置（兼容不同分支）
          DEFCONFIG_FILE=$(find configs -name "*gl-mt6000.config" | head -1)
          if [ -n "$DEFCONFIG_FILE" ]; then
            cp $DEFCONFIG_FILE .config
          else
            cp configs/templates/mediatek/mt798x/config .config
            echo 'CONFIG_TARGET_DEVICE_mediatek_mt798x_DEVICE_gl-mt6000=y' >> .config
          fi
          
          # 强制启用 2GB 内存
          echo 'CONFIG_TARGET_MEMORY_PROFILE_2048=y' >> .config
          echo 'CONFIG_LINUX_KERNEL_MEMORY_SIZE=2048' >> .config
          # MT7531AE 交换机专属配置（禁用冲突驱动）
          echo 'CONFIG_PACKAGE_kmod-switch-mt7531=y' >> .config
          echo 'CONFIG_PACKAGE_mt7531-firmware=y' >> .config
          echo '# CONFIG_PACKAGE_kmod-dsa-mt7530 is not set' >> .config
          echo 'CONFIG_SWITCH_MT7531_SPEED_GIGA=y' >> .config
          # eMMC 大容量支持
          echo 'CONFIG_PACKAGE_kmod-mmc=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-sdhci-mt7622=y' >> .config
          # 中文语言包 + 基础工具
          echo 'CONFIG_PACKAGE_luci-i18n-base-zh-cn=y' >> .config
          echo 'CONFIG_PACKAGE-ethtool=y' >> .config
          
          make defconfig  # 生成最终配置

      # 5. 下载依赖（加速编译）
      - name: Download dependencies
        run: |
          cd immortalwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;  # 删除空文件

      # 6. 编译固件（容错机制）
      - name: Compile GL-MT6000 firmware
        run: |
          cd immortalwrt
          # 多线程编译失败则单线程输出详细日志
          make -j$(($(nproc) + 1)) || make -j1 V=s
          # 列出编译产物（仅显示 GL-MT6000 固件）
          ls -lh bin/targets/mediatek/mt798x/ | grep gl-mt6000

      # 7. 上传固件（仅保留 GL-MT6000 相关产物）
      - name: Upload GL-MT6000 firmware
        uses: actions/upload-artifact@v4
        with:
          name: gl-mt6000-2g-128g-mt7531ae-firmware
          path: |
            immortalwrt/bin/targets/mediatek/mt798x/*gl-mt6000*.bin
            immortalwrt/bin/targets/mediatek/mt798x/*gl-mt6000*.img
          retention-days: 30

      # 8. 上传到 Release（可选，便于长期保存）
      - name: Create Release for GL-MT6000
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: gl-mt6000-2g-128g-mt7531ae-${{ github.run_id }}
          name: GL-MT6000 (2G+128G+MT7531AE) ImmortalWrt ${{ github.run_id }}
          files: immortalwrt/bin/targets/mediatek/mt798x/*gl-mt6000*
          body: |
            ImmortalWrt Firmware for GL.iNet GL-MT6000
            - Hardware: 2GB RAM + 128GB eMMC + MT7531AE Switch
            - Compile time: ${{ github.run_at }}
            - Note: Only for GL.iNet GL-MT6000 (NOT Xiaomi MT6000)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
